<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵魂咖啡寻踪 - 深度风味分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c4a484',
                    },
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c4a484;
            --deep-black: #0a0a0c;
            --soft-white: #f5f5f7;
            --accent-orange: #d4a373;
        }


        body {
            margin: 0;
            background: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Montserrat', 'Noto Serif SC', serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(196, 164, 132, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 163, 115, 0.05) 0%, transparent 40%);
        }

        #app {
            width: min(100%, 72rem);
            margin-inline: auto;
            position: relative;
            z-index: 10;
        }

        #quiz-screen,
        #result-screen,
        #loading-screen,
        #start-screen {
            width: 100%;
        }

        #quiz-screen .glass-card,
        #result-screen .glass-card {
            margin-inline: auto;
        }

        #quiz-screen .glass-card {
            max-width: 54rem;
        }

        #question-number,
        #category-tag,
        #header-spacer {
            min-width: 6rem;
        }

        #start-screen {
            width: min(100%, 26rem);
            min-height: calc(100vh - 2rem);
            margin-inline: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #start-screen .icon-container,
        #start-screen h1,
        #start-screen p,
        #start-screen button {
            position: relative;
            z-index: 1;
        }


        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }


        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }


        .option-btn {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }


        .option-btn:hover {
            background: rgba(196, 164, 132, 0.15);
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }


        .option-btn.selected {
            background: var(--gold);
            color: var(--deep-black);
            border-color: var(--gold);
        }


        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }


        .progress-bar {
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            pointer-events: none;
        }


        .progress-fill {
            height: 100%;
            background: var(--gold);
            transition: width 0.5s ease;
            box-shadow: 0 0 15px var(--gold);
        }


        /* 模拟光影漂浮 */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
            animation: float 20s infinite alternate;
            pointer-events: none;
        }


        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }


        .icon-container svg {
            filter: drop-shadow(0 0 8px rgba(196, 164, 132, 0.5));
        }

        button {
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .glass-card {
                border-radius: 1.5rem;
            }

            .orb {
                filter: blur(56px);
                opacity: 0.2;
            }

            .option-btn:hover {
                transform: none;
                box-shadow: none;
            }
        }

        @media (max-width: 640px) {
            main {
                max-width: 100%;
            }

            #start-screen {
                width: min(100%, 24rem);
                min-height: calc(100vh - 1.5rem);
            }

            #category-tag {
                max-width: 11rem;
                text-align: right;
                line-height: 1.4;
                letter-spacing: 0.18em;
            }

            #options-container {
                gap: 0.75rem;
            }

            #recommendations {
                gap: 1rem;
            }

            .option-btn {
                padding: 1rem;
                font-size: 0.95rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-3 sm:p-4">

        </section>


        <!-- 分析加载中 -->

    </main>

            acid: { label: "明亮酸质", tone: "你偏爱有棱角、会发光的风味", image: "像一口咬开新鲜果肉时的清醒感" },
            bitterness: { label: "深色苦韵", tone: "你能欣赏更深沉、更有骨架的表达", image: "像夜色落下后依旧有层次的余韵" },
            body: { label: "厚实醇感", tone: "你需要的是包裹感和落地感", image: "像手心握住一只温热陶杯的踏实" },
            sweetness: { label: "柔和甜感", tone: "你会被圆润、温暖、让人放松的风味打动", image: "像甜点最后一口留在舌尖的安慰" },
            floral: { label: "轻盈花香", tone: "你对细节、空气感和余味里的微光格外敏锐", image: "像风吹过花园时不经意扑来的香气" }
        };

        const beanVoice = {
            "瑰夏·翡翠庄园": "它像一封写给高敏感味觉的情书，不靠浓烈取胜，而是靠层层展开的精致击中人心。",
            "埃塞俄比亚·耶加雪菲": "它像把清晨折成一杯咖啡，干净、轻盈，适合那些一闻到香气就能决定今天心情的人。",
            "哥伦比亚·厌氧草莓": "它自带舞台感，甜感和发酵香像灯光一层层推上来，很适合需要惊喜的人。",
            "苏门答腊·曼特宁": "它不是讨巧型选手，而是那种越喝越让人安心的存在，像低声但有分量的回应。",
            "危地马拉·花神": "它最迷人的地方在平衡，像一个很会拿捏分寸的人，温柔却不寡淡，复杂却不喧哗。",
            "巴西·喜拉多": "它有一种日常里的高级感，不张扬，却能把舒服这件事做得非常完整。",
            "肯尼亚·SL28": "它的锋利与厚度同时在线，像一个敢表达、也撑得住场面的灵魂。"
        };

        function getTopTraits(scores, count = 2) {
            return Object.entries(scores)
                .sort((a, b) => b[1] - a[1])
                .slice(0, count)
                .map(([key]) => key);
        }

        function buildRecommendationReason(item, rank, dominantTraits, personalityTitle) {
            const voices = [
                "如果说你的味觉人格有一条暗线，" + item.name + "正好踩在那条线最发亮的位置。",
                item.name + "适合你，不是因为它单纯好喝，而是因为它和你的偏好节奏几乎天然同频。",
                "把你的答案翻译成一杯咖啡，" + item.name + "会是其中最像你的那一种表达。"
            ];
            const closers = [
                "所以它给你的不是单一风味命中，而是一种“这杯像我”的确认感。",
                "喝到它时，你更容易在第一口就产生熟悉感，第二口开始上头，第三口想记住它。",
                "对你来说，它不是推荐名单里的安全牌，而更像会被反复回购的那一支。"
            ];
            const [primaryTrait, secondaryTrait] = dominantTraits;
            const primaryMeta = traitMeta[primaryTrait];
            const secondaryMeta = traitMeta[secondaryTrait];

            return [
                voices[rank] || voices[0],
                beanVoice[item.name],
                `你的测试结果里，最突出的偏好是“${primaryMeta.label}”，其次是“${secondaryMeta.label}”。${primaryMeta.tone}，也会被${secondaryMeta.image}这样的细节打动。`,
                `${item.name}刚好把这两种期待接在一起，让它既能呼应你“${personalityTitle}”这一面，又不会落进千篇一律的标准答案。`,
                closers[rank] || closers[0]
            ].join("");
        }


        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            updateQuestion();
        }


        function updateQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-number').innerText = `${String(currentIdx + 1).padStart(2, '0')} / 15`;
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('question-icon').innerHTML = q.icon;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn p-6 text-left rounded-xl text-lg flex justify-between items-center';
                btn.innerHTML = `<span>${opt.text}</span><span class="opacity-0 transition-opacity">→</span>`;
                btn.onclick = () => selectOption(opt);
                container.appendChild(btn);
            });


            document.getElementById('progressFill').style.width = `${((currentIdx) / 15) * 100}%`;
            document.getElementById('prev-btn').disabled = currentIdx === 0;
        }


        function selectOption(opt) {
            // 保存得分
            history.push({ ...userScores });
            for (let key in opt.scores) {
                userScores[key] += opt.scores[key];
            }


            if (currentIdx < questions.length - 1) {
                currentIdx++;
                updateQuestion();
            } else {
                showLoading();
            }
        }


        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                userScores = history.pop();
                updateQuestion();
            }
        }


        function showLoading() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('progressFill').style.width = `100%`;


            const steps = ["提取风味指纹...", "匹配产区海拔...", "演算烘焙度契合率...", "最终报告生成中..."];
            let step = 0;
            const interval = setInterval(() => {
                document.getElementById('loading-text').innerText = steps[step];
                step++;
                if (step >= steps.length) {
                    clearInterval(interval);
                    showResults();
                }
            }, 800);
        }


        function showResults() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');


            // 计算人格
            let title = "优雅的平衡主义者";
            let desc = "你追求生活中的秩序与美感，既迷恋清晨的明亮，也懂得夜晚的深沉。你需要的咖啡不仅是一杯饮品，更是一场感官的交响乐。";
            
            if (userScores.acid > 25) {
                title = "极光追寻者";
                desc = "你天生好奇，热爱冒险。明亮的酸质正如你对世界不竭的探索欲，只有那抹带有爆发力的灵动才能满足你的灵魂。";
            } else if (userScores.body > 25) {
                title = "大地的守望者";
                desc = "你性格稳重，珍视时间的沉淀。你迷恋那种厚重且真实的包裹感，咖啡对你而言是坚实的依靠与静谧的独处。";
            } else if (userScores.sweetness > 25) {
                title = "温柔的造梦师";
                desc = "世界在你眼中充满了柔和的光影。你拒绝苦涩，拥抱所有的甘甜与温柔，你是那个总能在平凡日子里发现美好的人。";
            }


            document.getElementById('personality-title').innerText = title;
            document.getElementById('personality-desc').innerText = desc;

            const dominantTraits = getTopTraits(userScores, 2);

            // 推荐逻辑：计算用户得分与每种豆子profile的相似度（欧几里得距离逆向）
            const scoredInventory = inventory.map(item => {
                let diff = 0;
                for (let key in userScores) {
                    // 归一化得分后再对比
                    const normalizedUserScore = (userScores[key] / 30) * 5; 
                    diff += Math.pow(normalizedUserScore - item.profile[key], 2);
                }
                return { ...item, match: 100 - Math.sqrt(diff) * 5 };
            }).sort((a, b) => b.match - a.match);


            const recContainer = document.getElementById('recommendations');
            recContainer.innerHTML = '';
            scoredInventory.slice(0, 3).forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `glass-card p-5 sm:p-6 flex flex-col items-center text-center fade-in`;
                card.style.animationDelay = `${idx * 0.2}s`;
                const recommendationReason = buildRecommendationReason(item, idx, dominantTraits, title);
                card.innerHTML = `
                    <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-gold/20 flex items-center justify-center mb-4 sm:mb-6 text-gold font-bold text-lg sm:text-xl">
                        ${idx + 1}
                    </div>
                    <h5 class="text-lg sm:text-xl font-bold mb-2 leading-snug">${item.name}</h5>
                    <div class="flex flex-wrap justify-center gap-2 mb-4">
                        ${item.tags.map(t => `<span class="text-[10px] border border-white/20 px-2 py-0.5 rounded-full text-gray-400">${t}</span>`).join('')}
                    </div>
                    <p class="text-sm text-gray-500 mb-5 sm:mb-6 flex-grow leading-relaxed">${item.desc}</p>
                    <p class="text-left text-[13px] sm:text-sm text-stone-300 leading-7 mb-5 sm:mb-6 border-t border-white/10 pt-4">${recommendationReason}</p>
                    <div class="text-gold text-sm tracking-[0.2em] sm:tracking-widest font-bold">匹配度 ${Math.round(item.match)}%</div>
                `;
                recContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
