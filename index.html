<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>灵魂咖啡寻踪 - 深度风味分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c4a484',
                    },
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c4a484;
            --deep-black: #0a0a0c;
            --soft-white: #f5f5f7;
            --accent-orange: #d4a373;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Montserrat', 'Noto Serif SC', serif;
            overflow-x: hidden;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(196, 164, 132, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 163, 115, 0.05) 0%, transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        html {
            height: -webkit-fill-available;
        }

        #app {
            width: 100%;
            max-width: 600px; /* 移动端优先，限制最大宽度 */
            padding: 1rem;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            position: relative;
            z-index: 20;
            width: 100%;
        }

        .option-btn:active {
            background: rgba(196, 164, 132, 0.2);
            transform: scale(0.98);
        }

        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            pointer-events: none;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--gold);
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.2;
            animation: float 15s infinite alternate;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        /* 专门为保存图片设计的海报样式 */
        #poster-container {
            position: fixed;
            left: -9999px;
            width: 375px;
            background: #0a0a0c;
            color: #f5f5f7;
            padding: 30px;
            font-family: 'Montserrat', 'Noto Serif SC', serif;
        }

        .poster-header {
            text-align: center;
            border-bottom: 1px solid rgba(196, 164, 132, 0.3);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .poster-title {
            color: #c4a484;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .poster-personality {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff 0%, #c4a484 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .poster-desc {
            font-size: 14px;
            color: #999;
            line-height: 1.6;
        }

        .poster-recommendation {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .poster-bean-name {
            color: #c4a484;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .poster-bean-desc {
            font-size: 12px;
            color: #888;
        }

        .poster-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #555;
            letter-spacing: 2px;
        }

        /* 移动端全屏适配优化 */
        @media (max-height: 700px) {
            #app { padding-top: 0.5rem; }
            h1 { font-size: 2.5rem !important; }
            .option-btn { padding: 0.75rem !important; }
        }
    </style>
</head>
<body>

    <div class="orb w-64 h-64 bg-yellow-900 top-[10%] left-[-10%]"></div>
    <div class="orb w-56 h-56 bg-orange-900 bottom-[10%] right-[-10%]" style="animation-delay: -5s;"></div>

    <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
    </div>

    <main id="app">
        <!-- 开始页面 -->
        <section id="start-screen" class="text-center fade-in">
            <div class="mb-8 flex justify-center">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#c4a484" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2c4.418 0 8 3.582 8 8s-3.582 8-8 8-8-3.582-8-8 3.582-8 8-8z"/>
                    <path d="M12 2c-4 4-4 12 0 16"/>
                </svg>
            </div>
            <p class="text-xs uppercase tracking-[0.3em] text-gold/80 mb-4">亲爱的咖啡旅人</p>
            <h1 class="text-4xl sm:text-5xl font-bold mb-6 gradient-text leading-tight">灵魂咖啡寻踪</h1>
            <p class="text-sm sm:text-base text-gray-400 mb-10 leading-relaxed px-4">
                穿越迷雾般的风味森林，在15个直觉瞬间中，
                发现那支跨越山海只为契合你的本命豆。
            </p>
            <button onclick="startQuiz()" class="w-full px-12 py-4 bg-transparent border border-gold text-gold rounded-full text-lg hover:bg-gold hover:text-black transition-all active:scale-95">
                开启寻踪之旅
            </button>
        </section>

        <!-- 问题页面 -->
        <section id="quiz-screen" class="hidden">
            <div class="glass-card p-6 sm:p-8">
                <div class="flex justify-between items-center mb-8">
                    <span id="question-number" class="text-gold font-mono tracking-widest text-sm">01 / 15</span>
                    <span id="category-tag" class="text-[10px] uppercase tracking-[0.2em] text-gray-500">Sensory Perception</span>
                </div>
                
                <div id="question-content" class="fade-in">
                    <div id="question-icon" class="mb-6 flex justify-center h-16"></div>
                    <h2 id="question-text" class="text-xl sm:text-2xl font-medium mb-8 text-center leading-tight min-h-[3.5rem]"></h2>
                    <div id="options-container" class="grid grid-cols-1 gap-3"></div>
                </div>

                <div class="mt-8 flex justify-start">
                    <button id="prev-btn" onclick="prevQuestion()" class="text-sm text-gray-500 hover:text-white transition-colors">
                        ← 返回上一步
                    </button>
                </div>
            </div>
        </section>

        <!-- 分析加载中 -->
        <section id="loading-screen" class="hidden text-center fade-in py-12">
            <div class="relative w-20 h-20 mx-auto mb-8">
                <div class="absolute inset-0 border-2 border-gold opacity-10 rounded-full"></div>
                <div class="absolute inset-0 border-t-2 border-gold rounded-full animate-spin"></div>
            </div>
            <h2 class="text-xl font-light tracking-widest mb-4 text-gold">风味罗盘校准中...</h2>
            <p id="loading-text" class="text-xs text-gray-500 italic px-4">正在提取您的嗅觉潜意识...</p>
        </section>

        <!-- 结果报告页面 -->
        <section id="result-screen" class="hidden fade-in">
            <div class="glass-card overflow-hidden mb-8 shadow-2xl">
                <div class="bg-gradient-to-b from-stone-900 to-black p-8 text-center border-b border-white/5">
                    <h3 class="text-gold uppercase tracking-[0.3em] mb-4 text-[10px]">风味人格分析报告</h3>
                    <h2 id="personality-title" class="text-3xl font-bold mb-4 gradient-text"></h2>
                    <p id="personality-desc" class="text-xs sm:text-sm text-gray-400 leading-relaxed"></p>
                </div>
                
                <div class="p-6">
                    <h4 class="text-center text-xs mb-6 tracking-widest text-gray-500 uppercase">—— 馆藏推荐 ——</h4>
                    <div id="recommendations" class="space-y-4"></div>
                </div>
            </div>
            
            <div class="flex flex-col gap-4">
                <button onclick="saveAsImage()" id="save-btn" class="w-full py-4 bg-gold text-black rounded-full font-bold tracking-widest active:scale-95 transition-all shadow-lg shadow-gold/20">
                    生成海报图片
                </button>
                <button onclick="location.reload()" class="w-full py-4 bg-white/5 text-gray-400 rounded-full text-sm hover:text-white transition-all">
                    重新开始测试
                </button>
            </div>
        </section>
    </main>

    <!-- 隐藏的海报生成模板 -->
    <div id="poster-container">
        <div class="poster-header">
            <div class="poster-title">灵魂咖啡寻踪</div>
            <div class="poster-personality" id="poster-personality-title"></div>
            <div class="poster-desc" id="poster-personality-desc"></div>
        </div>
        <div id="poster-recommendations-list"></div>
        <div class="poster-footer">
            EXPLORE YOUR COFFEE SOUL<br>
            @luckycoffee.top
        </div>
    </div>

    <script>
        const icons = {
            fruit: `<svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor" class="text-orange-400"><path d="M12,2L13,4C16,4.2 19,6 20.5,8.5C22,11 22,14 21,17C20,20 17,22 14,22C11,22 8,20.5 6.5,18.5C5,16.5 4.5,14 5,11.5C5.5,9 7,6.5 9.5,5L12,2Z"/></svg>`,
            forest: `<svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor" class="text-green-600"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>`,

            fire: `<svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor" class="text-red-500"><path d="M17.66,11.2C17.43,10.9 17.15,10.64 16.89,10.38C16.22,9.7 15.46,9.02 15.16,8.14C14.82,7.13 15.05,6.11 15.4,5.17C15.55,4.77 15.71,4.37 15.84,3.97C15.94,3.61 15.9,3.23 15.73,2.9C15.46,2.41 14.94,2.13 14.4,2.21C13.28,2.37 12.23,2.91 11.33,3.61C9.6,4.96 8.5,7.03 8.5,9.25C8.5,9.3 8.5,9.36 8.5,9.41C8.4,9.4 8.3,9.4 8.2,9.4C6.43,9.4 5,10.83 5,12.6C5,13 5.08,13.38 5.22,13.73C4.5,14.63 4,15.76 4,17C4,19.76 6.24,22 9,22C11.76,22 14,19.76 14,17C14,16.63 13.96,16.27 13.88,15.92C15.1,15.41 16,14.2 16,12.8C16,12.21 15.82,11.66 15.5,11.2H17.66Z"/></svg>`,

        };

        const questions = [
            { text: "如果清晨是一段旋律，你希望它是？", icon: icons.sparkle, options: [{ text: "明亮轻快的长笛协奏曲", scores: { acid: 3, sweetness: 2 } }, { text: "深沉悠远的大提琴独奏", scores: { bitterness: 3, body: 2 } }, { text: "慵懒柔和的萨克斯风", scores: { body: 1, sweetness: 3 } }, { text: "静谧清冷的钢琴练习曲", scores: { acid: 2, floral: 2 } }] },

            { text: "旅行时，你更向往哪里？", icon: icons.forest, options: [{text:"云雾缭绕的高山庄园", scores:{acid:3, floral:3}}, {text:"香料气息的古老集市", scores:{bitterness:2, body:3}}, {text:"静谧的海边椰林", scores:{sweetness:3, body:1}}, {text:"清晨的森林深处", scores:{acid:2, floral:2}}] },
            { text: "你对酸味的容忍度如何？", icon: icons.fruit, options: [{text:"像柠檬水般的明亮刺激", scores:{acid:5}}, {text:"像红酒般的微酸平衡", scores:{acid:3, sweetness:2}}, {text:"几乎感觉不到酸", scores:{bitterness:3, body:2}}, {text:"完全不喜欢酸", scores:{bitterness:5}}] },

            { text: "如果咖啡能带你去一个季节？", icon: icons.fire, options: [{text:"万物生长的暖春", scores:{floral:5}}, {text:"热情奔放的盛夏", scores:{acid:5}}, {text:"金灿灿的深秋", scores:{sweetness:5}}, {text:"壁炉旁的寒冬", scores:{bitterness:5, body:3}}] },
            { text: "你更偏好哪类零食？", icon: icons.fruit, options: [{text:"蔓越莓干", scores:{acid:4}}, {text:"烘烤大杏仁", scores:{body:3, bitterness:2}}, {text:"手工太妃糖", scores:{sweetness:5}}, {text:"干花花瓣酥", scores:{floral:5}}] },

            { text: "你习惯的饮用场景？", icon: icons.night, options: [{text:"工作中的强效唤醒", scores:{bitterness:4, body:4}}, {text:"悠闲的周末早午餐", scores:{acid:3, sweetness:3}}, {text:"傍晚的独处冥想", scores:{floral:4}}, {text:"好友聚会的下午茶", scores:{sweetness:4, body:2}}] },
            { text: "你对香气的期待？", icon: icons.forest, options: [{text:"爆发性的浓郁花香", scores:{floral:5}}, {text:"持久稳定的坚果余韵", scores:{body:4}}, {text:"清新的果汁感", scores:{acid:5}}, {text:"复杂的香料与木质调", scores:{bitterness:3, floral:2}}] },

        const inventory = [
            { name: "特批雪莉", tags: ["洪都拉斯", "莫卡庄园"], desc: "饱满细腻的香草冰淇淋口感，浆果酸甜感，树莓奶油，牛奶花生饮料。", profile: { acid: 3, floral: 2, sweetness: 5, body: 4, bitterness: 2 } },

            { name: "江南雨巷", tags: ["厄瓜多尔", "厌氧发酵"], desc: "主体风味来自云南保山，柑橘香气与酸度并存，口感清新。", profile: { acid: 4, floral: 3, sweetness: 3, body: 3, bitterness: 2 } },
            { name: "赤橘霞光", tags: ["云南", "波本浸渍"], desc: "馥郁柔和的酒香，黑朗姆酒，波本酒，黑加仑，深色浆果味。", profile: { acid: 3, floral: 2, sweetness: 4, body: 4, bitterness: 3 } },

            { name: "丹荔露", tags: ["云南", "冰荔处理"], desc: "强劲浓郁的蓝莓气息，紫色花香，利宾纳葡萄汁，蓝莓奶油蛋糕。", profile: { acid: 3, floral: 4, sweetness: 5, body: 3, bitterness: 2 } },
            { name: "如梦令", tags: ["云南", "增味水洗"], desc: "强劲浓郁的蓝莓气息，紫色花香，利宾纳葡萄汁，甜感细腻。", profile: { acid: 2, floral: 5, sweetness: 5, body: 3, bitterness: 2 } },
            { name: "蓝山一号", tags: ["牙买加", "水洗"], desc: "浓郁醇厚的黑巧克力风味，细腻奶油触感，焦糖奶油霜。", profile: { acid: 1, floral: 1, sweetness: 3, body: 5, bitterness: 3 } },
            { name: "白鹿", tags: ["耶加雪菲", "原生种"], desc: "清新的黄柠檬香气，成熟杏桃甜香，白花香气，茉莉，余韵悠长。", profile: { acid: 4, floral: 5, sweetness: 4, body: 2, bitterness: 2 } },
            { name: "Wonder of U", tags: ["哥伦比亚", "粉红波旁"], desc: "香甜的热带水果气息，荔枝，蛇皮果，香印青提，泰国小菠萝。", profile: { acid: 4, floral: 4, sweetness: 5, body: 3, bitterness: 2 } },
            { name: "金标瑰夏", tags: ["瑰夏村", "蜜处理"], desc: "强劲甜香的花香，玉兰，混合甜橙，黄柠檬，明亮花香。", profile: { acid: 5, floral: 5, sweetness: 4, body: 2, bitterness: 1 } },
            { name: "White Petal", tags: ["巴拿马", "瑰夏"], desc: "细致绵长的蜂蜜甜感，黄柠檬，轻柔洋甘菊茉莉花香，饱满扎实。", profile: { acid: 4, floral: 5, sweetness: 4, body: 3, bitterness: 2 } },
            { name: "洛神游", tags: ["哥斯达黎加", "瑰夏"], desc: "干净清冽的浆果酸甜，红葡萄，草莓，洛神，甜橙，栀子花香。", profile: { acid: 5, floral: 4, sweetness: 3, body: 2, bitterness: 2 } },
            { name: "沉舟", tags: ["印尼", "雪莉酒桶"], desc: "威士忌，橡木，果脯；奶咖表现：香草奶油，威士忌，榛子。", profile: { acid: 2, floral: 1, sweetness: 4, body: 5, bitterness: 4 } }
        ];

        let currentIdx = 0;
        let userScores = { acid: 0, bitterness: 0, body: 0, sweetness: 0, floral: 0 };
        let history = [];

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            updateQuestion();
        }

        function updateQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-number').innerText = `${String(currentIdx + 1).padStart(2, '0')} / 15`;
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('question-icon').innerHTML = q.icon;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn p-4 text-left rounded-xl text-base flex justify-between items-center bg-white/5 border border-white/10 hover:border-gold transition-all';
                btn.innerHTML = `<span>${opt.text}</span><span class="text-gold">→</span>`;
                btn.onclick = () => selectOption(opt);
                container.appendChild(btn);
            });

            document.getElementById('progressFill').style.width = `${((currentIdx) / 15) * 100}%`;
            document.getElementById('prev-btn').style.opacity = currentIdx === 0 ? '0' : '1';
        }

        function selectOption(opt) {
            history.push({ ...userScores });
            for (let key in opt.scores) {
                userScores[key] += opt.scores[key];
            }

            if (currentIdx < questions.length - 1) {
                currentIdx++;
                updateQuestion();
            } else {
                showLoading();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                userScores = history.pop();
                updateQuestion();
            }
        }

        function showLoading() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('progressFill').style.width = `100%`;

            const steps = ["提取风味指纹...", "匹配产区海拔...", "演算烘焙度契合率...", "最终报告生成中..."];
            let step = 0;
            const interval = setInterval(() => {
                document.getElementById('loading-text').innerText = steps[step];
                step++;
                if (step >= steps.length) {
                    clearInterval(interval);
                    showResults();
                }
            }, 600);
        }

        function showResults() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let title = "优雅的平衡主义者";
            let desc = "你追求生活中的秩序与美感，既迷恋清晨的明亮，也懂得夜晚的深沉。你需要的咖啡不仅是一杯饮品，更是一场感官的交响乐。";
            
            const maxScore = Math.max(...Object.values(userScores));
            const topTrait = Object.keys(userScores).find(key => userScores[key] === maxScore);

            if (topTrait === 'acid') { title = "极光追寻者"; desc = "你天生好奇，热爱冒险。明亮的酸质正如你对世界不竭的探索欲。"; }
            else if (topTrait === 'body') { title = "大地的守望者"; desc = "你性格稳重，珍视时间的沉淀。你迷恋那种厚重且真实的包裹感。"; }
            else if (topTrait === 'sweetness') { title = "温柔的造梦师"; desc = "世界在你眼中充满了柔和的光影。你拒绝苦涩，拥抱所有的甘甜。"; }
            else if (topTrait === 'floral') { title = "林间漫步者"; desc = "你对细节格外敏锐，喜欢空气感和余味里的微光。"; }

            document.getElementById('personality-title').innerText = title;
            document.getElementById('personality-desc').innerText = desc;
            
            // 同步到海报
            document.getElementById('poster-personality-title').innerText = title;
            document.getElementById('poster-personality-desc').innerText = desc;

            const scoredInventory = inventory.map(item => {
                let diff = 0;
                for (let key in userScores) {
                    const normalizedUserScore = (userScores[key] / 30) * 5; 
                    diff += Math.pow(normalizedUserScore - item.profile[key], 2);
                }
                return { ...item, match: 100 - Math.sqrt(diff) * 5 };
            }).sort((a, b) => b.match - a.match);

            const recContainer = document.getElementById('recommendations');
            const posterRecList = document.getElementById('poster-recommendations-list');
            recContainer.innerHTML = '';
            posterRecList.innerHTML = '';

            scoredInventory.slice(0, 3).forEach((item, idx) => {
                // 页面展示卡片
                const card = document.createElement('div');
                card.className = `glass-card p-4 flex flex-col bg-white/5 border border-white/10 fade-in`;
                card.style.animationDelay = `${idx * 0.1}s`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <h5 class="text-lg font-bold text-gold">${item.name}</h5>
                        <span class="text-[10px] text-gray-500 font-mono">MATCH ${Math.round(item.match)}%</span>
                    </div>
                    <p class="text-[10px] text-gray-400 leading-relaxed">${item.desc}</p>
                `;
                recContainer.appendChild(card);

                // 海报内部卡片
                const posterCard = document.createElement('div');
                posterCard.className = 'poster-recommendation';
                posterCard.innerHTML = `
                    <div class="poster-bean-name">${item.name} <span style="float:right; font-size:10px; opacity:0.5;">${Math.round(item.match)}%</span></div>
                    <div class="poster-bean-desc">${item.desc}</div>
                `;
                posterRecList.appendChild(posterCard);
            });
        }

        async function saveAsImage() {
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.innerText = "正在生成海报...";
            btn.disabled = true;

            // 确保海报区域在渲染前是准备好的
            const poster = document.getElementById('poster-container');
            
            try {
                const canvas = await html2canvas(poster, {
                    backgroundColor: '#0a0a0c',
                    scale: 3, // 提高清晰度
                    useCORS: true,
                    logging: false
                });
                
                const link = document.createElement('a');
                link.download = `luckycoffee-report-${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                btn.innerText = "保存成功";
            } catch (e) {
                console.error(e);
                alert("生成失败，请长按截图分享");
                btn.innerText = "生成失败";
            } finally {
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }
    </script>
</body>
</html>
