<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>灵魂咖啡寻踪 - 深度风味分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c4a484',
                        accent: '#d4a373',
                    },
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c4a484;
            --deep-black: #0a0a0c;
            --soft-white: #f5f5f7;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Noto Sans SC', 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 500px;
            padding: 1.25rem;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option-btn {
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.15rem;
            text-align: left;
            width: 100%;
            font-size: 1.05rem;
            margin-bottom: 0.65rem;
            font-weight: 500;
        }

        .option-btn:active {
            background: var(--gold);
            color: var(--deep-black);
            transform: scale(0.98);
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            transition: width 0.4s ease;
        }

        /* 海报专用样式 */
        #poster-wrapper {
            position: fixed;
            left: -9999px;
            width: 375px;
            background: #0a0a0c;
            color: #f5f5f7;
            padding: 40px 25px;
            border: 1px solid #1a1a1a;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .poster-title {
            font-size: 10px;
            letter-spacing: 3px;
            color: #c4a484;
            margin-bottom: 12px;
            text-align: center;
        }

        .poster-main-title {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            color: #fff;
        }

        .poster-insight-box {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid #c4a484;
            padding: 18px;
            margin-bottom: 25px;
        }

        .poster-insight-title {
            font-size: 13px;
            color: #c4a484;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .poster-insight-content {
            font-size: 13px;
            line-height: 1.7;
            color: #bbb;
        }

        .poster-bean-item {
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .poster-bean-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .poster-bean-name {
            font-size: 14px;
            font-weight: 600;
            color: #eee;
        }

        .poster-bean-match {
            font-size: 11px;
            color: #c4a484;
            font-family: monospace;
        }

        .poster-review-box {
            font-size: 11px;
            color: #777;
            line-height: 1.4;
            font-style: italic;
        }

        .poster-promo-box {
            background: rgba(196, 164, 132, 0.08);
            border: 1px dashed #c4a484;
            padding: 12px;
            margin: 20px 0;
            text-align: center;
            border-radius: 8px;
        }

        .poster-promo-text {
            font-size: 11px;
            color: #c4a484;
            font-weight: 600;
            line-height: 1.4;
        }

        .poster-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
        }

        .review-bubble {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 8px 12px;
            margin-top: 8px;
        }
        
        .review-nickname {
            font-size: 10px;
            color: #888;
            margin-bottom: 2px;
            display: block;
        }
        
        .review-content {
            font-size: 11px;
            color: #999;
            line-height: 1.4;
            font-style: italic;
        }

        .bean-icon {
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
    </div>

    <main id="app">
        <!-- 开始 -->
        <section id="start-screen" class="text-center fade-in">
            <div class="mb-10 flex justify-center">
                <div class="w-20 h-20 rounded-full border border-gold/30 flex items-center justify-center">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c4a484" stroke-width="1.5">
                        <path d="M12 2c4.418 0 8 3.582 8 8s-3.582 8-8 8-8-3.582-8-8 3.582-8 8-8z"/>
                        <path d="M12 2c-4 4-4 12 0 16"/>
                    </svg>
                </div>
            </div>
            <h1 class="text-4xl font-bold mb-5 gradient-text leading-tight">灵魂咖啡寻踪</h1>
            <p class="text-gray-400 mb-10 leading-relaxed px-4 text-sm">
                只需 9 道选择题，<br>
                看看你的潜意识最爱哪支豆子。
            </p>
            <button onclick="startQuiz()" class="w-full py-4 bg-gold text-black rounded-full font-bold tracking-[0.2em] active:scale-95 transition-all shadow-xl shadow-gold/10">
                开启寻踪
            </button>
        </section>

        <!-- 答题 -->
        <section id="quiz-screen" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <span id="question-number" class="text-gold font-mono tracking-widest text-xs">01 / 09</span>
                <span class="text-[10px] uppercase tracking-widest text-gray-600">Quick Test</span>
            </div>
            
            <div id="question-content" class="fade-in">
                <h2 id="question-text" class="text-2xl font-bold mb-8 leading-snug"></h2>
                <div id="options-container"></div>
            </div>

            <div class="mt-8">
                <button id="prev-btn" onclick="prevQuestion()" class="text-xs text-gray-600 hover:text-white transition-colors">
                    ← 返回
                </button>
            </div>
        </section>

        <!-- 加载 -->
        <section id="loading-screen" class="hidden text-center fade-in py-20">
            <div class="w-14 h-14 mx-auto mb-6 relative">
                <div class="absolute inset-0 border-2 border-gold/10 rounded-full"></div>
                <div class="absolute inset-0 border-t-2 border-gold rounded-full animate-spin"></div>
            </div>
            <h2 class="text-lg font-light tracking-widest mb-4 text-gold/80">正在匹配风味...</h2>
        </section>

        <!-- 结果 -->
        <section id="result-screen" class="hidden fade-in">
            <div class="glass-card overflow-hidden mb-8">
                <div class="p-8 text-center border-b border-white/5 bg-white/[0.01]">
                    <h3 class="text-gold text-[10px] tracking-[0.3em] mb-4 uppercase">测试结果</h3>
                    <h2 id="personality-title" class="text-3xl font-bold mb-6 gradient-text"></h2>
                    <div id="personality-insight" class="text-left bg-white/[0.02] p-5 rounded-xl border-l-2 border-gold text-sm leading-relaxed text-gray-300"></div>
                </div>
                
                <div class="p-6">
                    <h4 class="text-center text-[10px] mb-6 tracking-widest text-gray-500 uppercase">—— 专属推荐 ——</h4>
                    <div id="recommendations" class="space-y-4"></div>
                    <div class="mt-6 p-4 bg-gold/10 border border-dashed border-gold rounded-xl text-center">
                        <p class="text-[10px] text-gold font-bold leading-relaxed">
                            购买后上传此截图为备注<br>将收到随机惊喜试喝装 (15g)
                        </p>
                    </div>
                </div>
            </div>
            
            <div class="space-y-4">
                <button onclick="saveAsImage()" id="save-btn" class="w-full py-4 bg-gold text-black rounded-full font-bold tracking-[0.2em] active:scale-95 transition-all">
                    保存海报
                </button>
                <button onclick="location.reload()" class="w-full py-4 text-gray-500 text-xs tracking-widest">
                    重新开始
                </button>
            </div>
        </section>
    </main>

    <!-- 海报模板 -->
    <div id="poster-wrapper">
        <div class="poster-title">COFFEE SOUL TEST</div>
        <div class="poster-main-title" id="poster-personality"></div>
        
        <div class="poster-insight-box">
            <div class="poster-insight-title">测评摘要</div>
            <div class="poster-insight-content" id="poster-insight"></div>
        </div>

        <div style="margin-bottom: 10px; font-size: 10px; color: #666; letter-spacing: 2px;">推荐单品</div>
        <div id="poster-beans"></div>

        <div class="poster-promo-box">
            <div class="poster-promo-text">
                购买后上传此截图为备注<br>将收到随机惊喜试喝装 (15g)
            </div>
        </div>

        <div class="poster-footer">
            COFFEE SOUL EXPLORER @luckycoffee.top
        </div>
    </div>

    <script>
        const questions = [
            {
                text: "如果现在要喝一杯，你更想选？",
                options: [
                    { text: "酸甜清爽的果汁感", scores: { acid: 5, floral: 2 } },
                    { text: "浓郁顺滑的巧克力感", scores: { body: 5, bitterness: 2 } },
                    { text: "带点发酵酒香的微醺感", scores: { sweetness: 4, body: 3 } },
                    { text: "清淡高雅的花香感", scores: { floral: 5, acid: 2 } }
                ]
            },
            {
                text: "你对咖啡“酸味”的看法是？",
                options: [
                    { text: "非常喜欢，越明亮越好", scores: { acid: 5 } },
                    { text: "可以接受，像水果那样的酸", scores: { acid: 3, sweetness: 3 } },
                    { text: "不太喜欢，希望低酸柔和", scores: { acid: 1, sweetness: 4 } },
                    { text: "完全拒绝，只想喝浓郁的", scores: { bitterness: 5, body: 5 } }
                ]
            },
            {
                text: "喝咖啡时，你更在意？",
                options: [
                    { text: "第一口的香气爆发", scores: { floral: 5, acid: 2 } },
                    { text: "咽下去后的回甘和醇厚", scores: { body: 5, sweetness: 3 } },
                    { text: "整体平衡，不偏不倚", scores: { sweetness: 4, body: 2 } },
                    { text: "清醒感，够劲儿就行", scores: { bitterness: 5 } }
                ]
            },
            {
                text: "如果心情不好，你会选什么治愈？",
                options: [
                    { text: "一颗酸甜多汁的橙子", scores: { acid: 4, floral: 1 } },
                    { text: "一整块浓郁黑巧克力", scores: { bitterness: 4, body: 3 } },
                    { text: "一大杯温热的奶茶", scores: { sweetness: 5, body: 2 } },
                    { text: "一朵刚开放的茉莉花", scores: { floral: 5 } }
                ]
            },
            {
                text: "你平时的性格更接近？",
                options: [
                    { text: "活力四射，爱冒险", scores: { acid: 5 } },
                    { text: "稳重内敛，讲效率", scores: { body: 5, bitterness: 2 } },
                    { text: "温柔随和，好相处", scores: { sweetness: 5 } },
                    { text: "感性细腻，重细节", scores: { floral: 5 } }
                ]
            },
            {
                text: "你最希望咖啡带来的状态是？",
                options: [
                    { text: "清晨的一针强心剂", scores: { bitterness: 5, body: 3 } },
                    { text: "午后阳光下的悠闲", scores: { acid: 3, sweetness: 4 } },
                    { text: "独处时的灵感火花", scores: { floral: 5 } },
                    { text: "深夜里的安静陪伴", scores: { body: 4, sweetness: 2 } }
                ]
            },
            {
                text: "哪种质感最让你舒服？",
                options: [
                    { text: "轻盈如风的丝滑", scores: { floral: 4, acid: 2 } },
                    { text: "扎实厚重的包裹感", scores: { body: 5 } },
                    { text: "冷冽干净的剔透感", scores: { acid: 5 } },
                    { text: "软糯香甜的细腻感", scores: { sweetness: 5 } }
                ]
            },
            {
                text: "如果咖啡有颜色，你希望它是？",
                options: [
                    { text: "明亮的柠檬黄", scores: { acid: 4, floral: 2 } },
                    { text: "深沉的焦糖褐", scores: { body: 4, sweetness: 3 } },
                    { text: "神秘的墨黑色", scores: { bitterness: 5 } },
                    { text: "清透的琥珀色", scores: { floral: 4, acid: 2 } }
                ]
            },
            {
                text: "最后，你此刻最直觉的想法？",
                options: [
                    { text: "想要极致的爽快", scores: { acid: 5 } },
                    { text: "想要温暖的安抚", scores: { sweetness: 5 } },
                    { text: "想要清醒的专注", scores: { bitterness: 4, body: 4 } },
                    { text: "想要轻盈的自由", scores: { floral: 5 } }
                ]
            }
        ];

        const inventory = [
            { name: "特批雪莉", tags: ["酒香", "甜美"], desc: "像香草冰淇淋一样顺滑，带点果酱甜感。", icon: "🍦", profile: { acid: 3, floral: 2, sweetness: 5, body: 4, bitterness: 2 }, review: { nick: "王**二", txt: "妈呀，真的一股奶油雪糕味儿，甜丝丝的太好喝了！" } },
            { name: "云野", tags: ["花香", "柑橘"], desc: "典型的耶加风味，柠檬橙子加茉莉花香。", icon: "🍋", profile: { acid: 5, floral: 5, sweetness: 3, body: 2, bitterness: 2 }, review: { nick: "张**花", txt: "好清亮！像喝柠檬茶一样，茉莉花香特别持久。" } },
            { name: "典藏曼特宁", tags: ["浓郁", "巧克力"], desc: "黑巧克力质感，完全没酸味，非常醇厚。", icon: "🍫", profile: { acid: 1, floral: 1, sweetness: 2, body: 5, bitterness: 4 }, review: { nick: "李**强", txt: "老咖啡人的最爱，够苦够浓，巧克力回甘太正了。" } },
            { name: "雨漫春尘", tags: ["浪漫", "玫瑰"], desc: "玫瑰花香和提子甜感，像在喝高级果汁。", icon: "🌹", profile: { acid: 5, floral: 5, sweetness: 4, body: 3, bitterness: 1 }, review: { nick: "陈**儿", txt: "这包装和味道都绝了，满屋子玫瑰香，甜而不腻。" } },
            { name: "丹荔露", tags: ["荔枝", "甜感"], desc: "爆发性的蓝莓和葡萄甜感，像奶油蛋糕。", icon: "🍇", profile: { acid: 3, floral: 4, sweetness: 5, body: 3, bitterness: 2 }, review: { nick: "周**七", txt: "甜度真的炸裂，像在喝葡萄汁，完全不像苦咖啡。" } },
            { name: "金标瑰夏", tags: ["高雅", "明亮"], desc: "强劲的玉兰花香和明亮的柠檬酸感。", icon: "✨", profile: { acid: 5, floral: 5, sweetness: 4, body: 2, bitterness: 1 }, review: { nick: "赵**磊", txt: "这就是瑰夏啊！酸质特别高级，每一口都是钱的味道。" } },
            { name: "沉舟", tags: ["酒桶", "硬朗"], desc: "威士忌和橡木桶味，非常深邃有力量。", icon: "🥃", profile: { acid: 2, floral: 1, sweetness: 4, body: 5, bitterness: 4 }, review: { nick: "刘**阳", txt: "威士忌味儿好浓，深夜加班来一杯真的绝配。" } }
        ];

        const insights = {
            acid: { title: "极光追寻者", desc: "你偏爱明亮、爽快的体验。这几支豆子都有着极佳的果酸和花香，正好能呼应你对“清爽感”的极致要求，一点都不拖泥带水。" },
            body: { title: "大地的守望者", desc: "你喜欢踏实、厚重的质感。为你选的豆子都有着极好的醇厚度和巧克力感，能给你带来最直接的温暖和包裹感。" },
            sweetness: { title: "温柔的造梦师", desc: "你天生拒绝苦涩，偏爱甘甜。这几款豆子几乎都是“甜感炸弹”，像甜点一样治愈，最适合你这种怕苦、爱生活的人。" },
            floral: { title: "林间漫步者", desc: "你追求的是细节和优雅。这几支豆子充满了各种花香和茶感，轻盈又不失层次，最能打动你细腻的感官。" },
            bitterness: { title: "深海沉思者", desc: "你追求的是纯粹和清醒。为你推的豆子够苦、够浓、够深邃，能让你在每一个需要专注的瞬间，感受到咖啡最原始的力量。" }
        };

        let currentIdx = 0;
        let userScores = { acid: 0, bitterness: 0, body: 0, sweetness: 0, floral: 0 };
        let history = [];

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            updateQuestion();
        }

        function updateQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-number').innerText = `${String(currentIdx + 1).padStart(2, '0')} / 09`;
            document.getElementById('question-text').innerText = q.text;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt);
                container.appendChild(btn);
            });

            document.getElementById('progressFill').style.width = `${((currentIdx) / 9) * 100}%`;
            document.getElementById('prev-btn').style.opacity = currentIdx === 0 ? '0' : '1';
        }

        function selectOption(opt) {
            history.push({ ...userScores });
            for (let key in opt.scores) {
                userScores[key] += opt.scores[key];
            }

            if (currentIdx < questions.length - 1) {
                currentIdx++;
                updateQuestion();
            } else {
                showLoading();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                userScores = history.pop();
                updateQuestion();
            }
        }

        function showLoading() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('progressFill').style.width = `100%`;

            setTimeout(() => {
                showResults();
            }, 800);
        }

        function showResults() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const maxScore = Math.max(...Object.values(userScores));
            const topTrait = Object.keys(userScores).find(key => userScores[key] === maxScore);
            const result = insights[topTrait] || insights['sweetness'];

            document.getElementById('personality-title').innerText = result.title;
            document.getElementById('personality-insight').innerText = result.desc;
            
            document.getElementById('poster-personality').innerText = result.title;
            document.getElementById('poster-insight').innerText = result.desc;

            const scoredInventory = inventory.map(item => {
                let diff = 0;
                for (let key in userScores) {
                    const normalizedUserScore = (userScores[key] / 20) * 5; 
                    diff += Math.pow(normalizedUserScore - item.profile[key], 2);
                }
                return { ...item, match: 100 - Math.sqrt(diff) * 6 };
            }).sort((a, b) => b.match - a.match);

            const recContainer = document.getElementById('recommendations');
            const posterBeans = document.getElementById('poster-beans');
            recContainer.innerHTML = '';
            posterBeans.innerHTML = '';

            scoredInventory.slice(0, 3).forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `glass-card p-4 flex flex-col bg-white/5 border border-white/10 fade-in`;
                card.style.animationDelay = `${idx * 0.1}s`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <h5 class="text-base font-bold text-gold"><span class="bean-icon">${item.icon}</span>${item.name}</h5>
                        <span class="text-[10px] text-gray-500 font-mono">${Math.round(item.match)}%</span>
                    </div>
                    <p class="text-[10px] text-gray-400 leading-relaxed">${item.desc}</p>
                    <div class="review-bubble">
                        <span class="review-nickname">${item.review.nick} 说：</span>
                        <p class="review-content">“${item.review.txt}”</p>
                    </div>
                `;
                recContainer.appendChild(card);

                const pItem = document.createElement('div');
                pItem.className = 'poster-bean-item';
                pItem.innerHTML = `
                    <div class="poster-bean-header">
                        <div class="poster-bean-name">${item.icon} ${item.name}</div>
                        <div class="poster-bean-match">${Math.round(item.match)}%</div>
                    </div>
                    <div class="poster-review-box">
                        ${item.review.nick}: “${item.review.txt}”
                    </div>
                `;
                posterBeans.appendChild(pItem);
            });
        }

        async function saveAsImage() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "生成中...";
            btn.disabled = true;

            try {
                const canvas = await html2canvas(document.getElementById('poster-wrapper'), {
                    backgroundColor: '#0a0a0c',
                    scale: 3,
                    useCORS: true
                });
                
                const link = document.createElement('a');
                link.download = `Coffee-Soul-${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                btn.innerText = "已保存";
            } catch (e) {
                alert("生成失败，请截图分享");
                btn.innerText = "生成失败";
            } finally {
                setTimeout(() => {
                    btn.innerText = "保存海报";
                    btn.disabled = false;
                }, 2000);
            }
        }
    </script>
</body>
</html>
