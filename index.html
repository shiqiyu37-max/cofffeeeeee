<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>灵魂咖啡寻踪 - 深度风味分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c4a484',
                    },
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c4a484;
            --deep-black: #0a0a0c;
            --soft-white: #f5f5f7;
            --accent-orange: #d4a373;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            background: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Montserrat', 'Noto Serif SC', serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(196, 164, 132, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 163, 115, 0.05) 0%, transparent 40%);
        }

        #app {
            width: min(100%, 72rem);
            margin-inline: auto;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option-btn {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            position: relative;
            z-index: 20;
        }

        .option-btn:active {
            background: rgba(196, 164, 132, 0.2);
            transform: scale(0.98);
        }

        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            pointer-events: none;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            transition: width 0.5s ease;
            box-shadow: 0 0 15px var(--gold);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
            animation: float 20s infinite alternate;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        button {
            cursor: pointer;
            touch-action: manipulation;
        }

        #screenshot-area {
            background: var(--deep-black);
            padding: 20px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-3 sm:p-4">

    <div class="orb w-64 h-64 sm:w-96 sm:h-96 bg-yellow-900 top-[10%] left-1/2 -translate-x-[62%]"></div>
    <div class="orb w-56 h-56 sm:w-80 sm:h-80 bg-orange-900 bottom-[8%] left-1/2 translate-x-[8%]" style="animation-delay: -5s;"></div>

    <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
    </div>

    <main id="app" class="w-full max-w-4xl mx-auto">
        <!-- 开始页面 -->
        <section id="start-screen" class="text-center fade-in">
            <div class="mb-6 sm:mb-8 flex justify-center">
                <div class="icon-container">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="text-gold sm:w-20 sm:h-20">
                        <path d="M12 2c4.418 0 8 3.582 8 8s-3.582 8-8 8-8-3.582-8-8 3.582-8 8-8z"/>
                        <path d="M12 2c-4 4-4 12 0 16"/>
                    </svg>
                </div>
            </div>
            <p class="text-xs sm:text-sm uppercase tracking-[0.35em] text-gold/80 mb-3 sm:mb-4">亲爱的咖啡旅人</p>
            <h1 class="text-4xl sm:text-5xl md:text-7xl font-bold mb-4 sm:mb-6 gradient-text leading-tight">灵魂咖啡寻踪</h1>
            <p class="text-base sm:text-lg md:text-xl text-gray-400 mb-8 sm:mb-12 max-w-2xl mx-auto leading-relaxed px-2">
                穿越迷雾般的风味森林，在15个直觉瞬间中，
                <span class="block sm:inline">发现那支跨越山海只为契合你的本命豆。</span>
            </p>
            <button onclick="startQuiz()" class="w-full sm:w-auto px-8 sm:px-12 py-4 bg-transparent border border-gold text-gold rounded-full text-base sm:text-lg hover:bg-gold hover:text-black transition-all duration-500 tracking-[0.25em] sm:tracking-widest active:bg-gold active:text-black">
                开启寻踪之旅
            </button>
        </section>

        <!-- 问题页面 -->
        <section id="quiz-screen" class="hidden">
            <div class="glass-card p-5 sm:p-8 md:p-12">
                <div class="flex justify-between items-start mb-8 sm:mb-12">
                    <span id="question-number" class="text-gold font-mono tracking-widest">01 / 15</span>
                    <span id="category-tag" class="text-[10px] sm:text-xs uppercase tracking-[0.2em] sm:tracking-[0.3em] text-gray-500 text-right">Sensory Perception</span>
                </div>
                
                <div id="question-content" class="fade-in">
                    <div id="question-icon" class="mb-4 sm:mb-6 flex justify-center h-16 sm:h-20"></div>
                    <h2 id="question-text" class="text-xl sm:text-2xl md:text-3xl font-medium mb-6 sm:mb-10 text-center leading-tight"></h2>
                    <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div class="mt-8 sm:mt-12 flex justify-between items-center gap-4">
                    <button id="prev-btn" onclick="prevQuestion()" class="text-sm sm:text-base text-gray-500 hover:text-white transition-colors disabled:opacity-0">
                        ← 返回上一步
                    </button>
                </div>
            </div>
        </section>

        <!-- 分析加载中 -->
        <section id="loading-screen" class="hidden text-center fade-in py-10 sm:py-0">
            <div class="relative w-20 h-20 sm:w-24 sm:h-24 mx-auto mb-6 sm:mb-8">
                <div class="absolute inset-0 border-2 border-gold opacity-20 rounded-full"></div>
                <div class="absolute inset-0 border-t-2 border-gold rounded-full animate-spin"></div>
            </div>
            <h2 class="text-xl sm:text-2xl font-light tracking-[0.2em] sm:tracking-widest mb-4 text-gold">风味罗盘校准中...</h2>
            <p id="loading-text" class="text-sm sm:text-base text-gray-500 italic px-4">正在提取您的嗅觉潜意识...</p>
        </section>

        <!-- 结果报告页面 -->
        <section id="result-screen" class="hidden fade-in">
            <div id="screenshot-area" class="glass-card overflow-hidden">
                <div class="bg-gradient-to-r from-stone-900 to-black p-6 sm:p-10 text-center border-b border-white/10">
                    <h3 class="text-gold uppercase tracking-[0.25em] sm:tracking-[0.4em] mb-4 text-xs sm:text-sm">风味人格分析报告</h3>
                    <h2 id="personality-title" class="text-3xl sm:text-4xl font-bold mb-4 leading-tight gradient-text"></h2>
                    <p id="personality-desc" class="text-sm sm:text-base text-gray-400 max-w-xl mx-auto leading-relaxed"></p>
                </div>
                
                <div class="p-5 sm:p-8 md:p-12">
                    <h4 class="text-center text-lg sm:text-xl mb-6 sm:mb-10 tracking-[0.18em] sm:tracking-widest">—— 馆藏推荐 ——</h4>
                    <div id="recommendations" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
                </div>
            </div>
            
            <div class="mt-8 sm:mt-12 flex flex-col sm:flex-row gap-4 justify-center items-center">
                <button onclick="saveAsImage()" class="w-full sm:w-auto px-10 py-4 bg-gold text-black rounded-full font-bold tracking-widest hover:bg-white transition-all active:scale-95">
                    保存报告图片
                </button>
                <button onclick="location.reload()" class="text-gray-500 hover:text-gold transition-colors tracking-widest text-sm">重新探索</button>
            </div>
        </section>
    </main>

            { name: "银河高速公路", tags: ["SOE 埃塞俄比亚", "西达摩", "日晒"], desc: "浓缩表现：橘皮，坚果，莓干；奶咖表现：太妃糖，黄油饼干，烤杏仁。", profile: { acid: 3, floral: 2, sweetness: 4, body: 4, bitterness: 3 } },
            { name: "金标瑰夏", tags: ["埃塞俄比亚", "瑰夏村", "蜜处理"], desc: "强劲甜香的花香，玉兰，鸡蛋花，金银花，混合甜橙，黄柠檬，明亮花香。", profile: { acid: 5, floral: 5, sweetness: 4, body: 2, bitterness: 1 } },
            { name: "White Petal", tags: ["巴拿马", "瑰夏", "水洗"], desc: "细致绵长的蜂蜜甜感，黄柠檬，葡萄柚，轻柔洋甘菊茉莉花香，饱满扎实。", profile: { acid: 4, floral: 5, sweetness: 4, body: 3, bitterness: 2 } },
            { name: "洛神游", tags: ["哥斯达黎加", "瑰夏", "水洗"], desc: "干净清冽的浆果酸甜，红葡萄，草莓，奇异果，洛神，甜橙，栀子花香。", profile: { acid: 5, floral: 4, sweetness: 3, body: 2, bitterness: 2 } },
            { name: "仲夏夜", tags: ["哥斯达黎加", "ET47", "黄蜜处理"], desc: "成熟轻柔的果汁触感，西番莲，沙棘果，核桃油杏仁香，草莓巧克力。", profile: { acid: 3, floral: 3, sweetness: 4, body: 3, bitterness: 2 } },
            { name: "涅里黄昏", tags: ["肯尼亚", "涅里", "日晒处理"], desc: "成熟细腻的黄杏，黄桃，枇杷，橘子水果气息，蓝莓酱，杨桃，油柑。", profile: { acid: 5, floral: 2, sweetness: 3, body: 4, bitterness: 3 } },
            { name: "拂晓", tags: ["埃塞俄比亚", "卡玛奇农场", "蜜处理"], desc: "细腻黄柠檬混合佛手柑，成熟草莓，杏桃血橙，覆盆子，风味清晰浓郁。", profile: { acid: 5, floral: 4, sweetness: 4, body: 2, bitterness: 2 } },
            { name: "对山", tags: ["卢旺达", "红波旁", "水洗"], desc: "细腻奶油触感，龙井，碧螺春绿茶混合白花香气，柚子，杏桃，绿茶感。", profile: { acid: 3, floral: 4, sweetness: 3, body: 3, bitterness: 3 } },
            { name: "芙蕾雅的吻", tags: ["哥斯达黎加", "瑰夏", "增味水洗"], desc: "成熟饱满的红色莓果，覆盆子，草莓，细致玫瑰花香，甜橙，沃柑，酒香。", profile: { acid: 4, floral: 5, sweetness: 5, body: 3, bitterness: 2 } },
            { name: "维纳斯之泪", tags: ["巴拿马", "瑰夏", "水洗"], desc: "优雅的白色花香，姜花，玉兰，多汁葡萄，葡萄柚，杏子，杏仁，蜂蜜绿茶。", profile: { acid: 4, floral: 5, sweetness: 4, body: 3, bitterness: 2 } },
            { name: "乌克丽丽小调", tags: ["肯尼亚", "SL28/34", "水洗"], desc: "明亮上扬的核果酸甜，青梅，李子，牛奶青枣，葡萄柚，沃柑，蜜香红茶。", profile: { acid: 5, floral: 2, sweetness: 3, body: 4, bitterness: 2 } },
            { name: "沉舟", tags: ["印度尼西亚", "日晒", "雪莉酒桶"], desc: "浓缩表现：威士忌，橡木，果脯；奶咖表现：香草奶油，威士忌，榛子。", profile: { acid: 2, floral: 1, sweetness: 4, body: 5, bitterness: 4 } }
        ];

        let currentIdx = 0;
        let userScores = { acid: 0, bitterness: 0, body: 0, sweetness: 0, floral: 0 };
        let history = [];
        const traitMeta = {
            acid: { label: "明亮酸质", tone: "你偏爱有棱角、会发光的风味", image: "像一口咬开新鲜果肉时的清醒感" },
            bitterness: { label: "深色苦韵", tone: "你能欣赏更深沉、更有骨架的表达", image: "像夜色落下后依旧有层次的余韵" },
            body: { label: "厚实醇感", tone: "你需要的是包裹感和落地感", image: "像手心握住一只温热陶杯的踏实" },
            sweetness: { label: "柔和甜感", tone: "你会被圆润、温暖、让人放松的风味打动", image: "像甜点最后一口留在舌尖的安慰" },
            floral: { label: "轻盈花香", tone: "你对细节、空气感和余味里的微光格外敏锐", image: "像风吹过花园时不经意扑来的香气" }
        };

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            updateQuestion();
        }

        function updateQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-number').innerText = `${String(currentIdx + 1).padStart(2, '0')} / 15`;
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('question-icon').innerHTML = q.icon;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn p-6 text-left rounded-xl text-lg flex justify-between items-center bg-white/5 border border-white/10 hover:border-gold transition-all';
                btn.innerHTML = `<span>${opt.text}</span><span class="text-gold">→</span>`;
                btn.onclick = () => selectOption(opt);
                container.appendChild(btn);
            });

            document.getElementById('progressFill').style.width = `${((currentIdx) / 15) * 100}%`;
            document.getElementById('prev-btn').style.opacity = currentIdx === 0 ? '0' : '1';
        }

        function selectOption(opt) {
            history.push({ ...userScores });
            for (let key in opt.scores) {
                userScores[key] += opt.scores[key];
            }

            if (currentIdx < questions.length - 1) {
                currentIdx++;
                updateQuestion();
            } else {
                showLoading();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                userScores = history.pop();
                updateQuestion();
            }
        }

        function showLoading() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('progressFill').style.width = `100%`;

            const steps = ["提取风味指纹...", "匹配产区海拔...", "演算烘焙度契合率...", "最终报告生成中..."];
            let step = 0;
            const interval = setInterval(() => {
                document.getElementById('loading-text').innerText = steps[step];
                step++;
                if (step >= steps.length) {
                    clearInterval(interval);
                    showResults();
                }
            }, 800);
        }

        function showResults() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let title = "优雅的平衡主义者";
            let desc = "你追求生活中的秩序与美感，既迷恋清晨的明亮，也懂得夜晚的深沉。你需要的咖啡不仅是一杯饮品，更是一场感官的交响乐。";
            
            const maxScore = Math.max(...Object.values(userScores));
            const topTrait = Object.keys(userScores).find(key => userScores[key] === maxScore);

            if (topTrait === 'acid') { title = "极光追寻者"; desc = "你天生好奇，热爱冒险。明亮的酸质正如你对世界不竭的探索欲。"; }
            else if (topTrait === 'body') { title = "大地的守望者"; desc = "你性格稳重，珍视时间的沉淀。你迷恋那种厚重且真实的包裹感。"; }
            else if (topTrait === 'sweetness') { title = "温柔的造梦师"; desc = "世界在你眼中充满了柔和的光影。你拒绝苦涩，拥抱所有的甘甜。"; }
            else if (topTrait === 'floral') { title = "林间漫步者"; desc = "你对细节格外敏锐，喜欢空气感和余味里的微光。"; }

            document.getElementById('personality-title').innerText = title;
            document.getElementById('personality-desc').innerText = desc;

            const scoredInventory = inventory.map(item => {
                let diff = 0;
                for (let key in userScores) {
                    const normalizedUserScore = (userScores[key] / 30) * 5; 
                    diff += Math.pow(normalizedUserScore - item.profile[key], 2);
                }
                return { ...item, match: 100 - Math.sqrt(diff) * 5 };
            }).sort((a, b) => b.match - a.match);

            const recContainer = document.getElementById('recommendations');
            recContainer.innerHTML = '';
            scoredInventory.slice(0, 3).forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `glass-card p-6 flex flex-col items-center text-center fade-in bg-white/5 border border-white/10`;
                card.style.animationDelay = `${idx * 0.2}s`;
                card.innerHTML = `
                    <div class="w-12 h-12 rounded-full bg-gold/20 flex items-center justify-center mb-4 text-gold font-bold">
                        ${idx + 1}
                    </div>
                    <h5 class="text-xl font-bold mb-2">${item.name}</h5>
                    <div class="flex flex-wrap justify-center gap-1 mb-3">
                        ${item.tags.map(t => `<span class="text-[10px] border border-white/20 px-2 py-0.5 rounded-full text-gray-400">${t}</span>`).join('')}
                    </div>
                    <p class="text-xs text-gray-400 mb-4 flex-grow leading-relaxed">${item.desc}</p>
                    <div class="text-gold text-sm font-bold mt-auto pt-4 border-t border-white/5 w-full">匹配度 ${Math.round(item.match)}%</div>
                `;
                recContainer.appendChild(card);
            });
        }

        async function saveAsImage() {
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            btn.innerText = "正在生成...";
            btn.disabled = true;

            try {
                const canvas = await html2canvas(document.getElementById('screenshot-area'), {
                    backgroundColor: '#0a0a0c',
                    scale: 2,
                    useCORS: true,
                    logging: false
                });
                
                const link = document.createElement('a');
                link.download = `咖啡风味报告-${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                btn.innerText = "保存成功";
            } catch (e) {
                console.error(e);
                alert("保存失败，请截图分享");
                btn.innerText = "保存失败";
            } finally {
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }
    </script>
</body>
</html>
